# Basic behavior
set -g mouse on
set -g history-limit 100000
set -g default-terminal "screen-256color"

# Prefix: Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start indexes from 1
set -g base-index 1
setw -g pane-base-index 1

# Split panes
bind ] split-window -h
bind - split-window -v
unbind '"'
unbind %

# Move across panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Status bar
set -g status on
set -g status-interval 5
set -g status-style bg=colour235,fg=colour250
set -g status-left-style fg=colour81,bg=colour235
set -g status-right-style fg=colour245,bg=colour235
set -g window-status-style fg=colour245,bg=colour235
set -g window-status-current-style fg=colour231,bg=colour31,bold
set -g window-status-separator "  "
set -g status-left-length 40
set -g status-left " #[bold]#S "
set -g status-justify centre
set -g status-right-length 60
set -g status-right '#(cd "#{pane_current_path}" 2>/dev/null && git branch --show-current 2>/dev/null | sed "s/.*/[&]/") '
